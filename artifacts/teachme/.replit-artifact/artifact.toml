kind = "web"
previewPath = "/"
title = "TeachME"
version = "1.0.0"
id = "artifacts/teachme"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23977

[services.development]
run = "pnpm --filter @workspace/teachme run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/teachme", "run", "build" ]
publicDir = "artifacts/teachme/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23977"
BASE_PATH = "/"
